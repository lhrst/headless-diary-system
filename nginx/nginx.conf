worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    upstream api_backend {
        server api:8000;
    }

    upstream web_frontend {
        server web:3000;
    }

    # ── Rate limiting zones (per client IP) ───────────────────
    # Tight limits for auth endpoints: 5 req/min for login/register.
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;
    # General API: 120 req/min (2 rps) is plenty for a personal diary.
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=120r/m;
    # Max concurrent connections per IP (prevents slowloris-style abuse).
    limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

    # Return 429 (not the default 503) so clients can see Retry-After.
    limit_req_status 429;
    limit_conn_status 429;

    # Make sure the server sees the real client IP when behind a
    # (future) proxy. Currently nginx IS the edge so this is a no-op,
    # but safe to set.
    set_real_ip_from 127.0.0.1;
    real_ip_header   X-Forwarded-For;
    real_ip_recursive on;

    server {
        listen 80;
        server_name _;

        client_max_body_size 500M;

        # Cap concurrent connections per IP across the whole server.
        limit_conn conn_zone 30;

        # Auth endpoints — strict rate limit.
        # burst=5 lets a legit user retry a typo a few times quickly,
        # nodelay means overflow is rejected instead of queued.
        location ~ ^/api/v1/auth/(login|register|refresh) {
            limit_req zone=auth_zone burst=5 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # API
        location /api/ {
            # Soft limit for general API traffic.
            limit_req zone=api_zone burst=60 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Health check
        location /health {
            proxy_pass http://api_backend;
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Web frontend
        location / {
            proxy_pass http://web_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
