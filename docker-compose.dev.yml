version: '3.8'

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    volumes:
      - ./api/app:/app/app
      - ./data/diaries:/data/diaries
      - ./data/media:/data/media
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    volumes:
      - ./api/app:/app/app
      - ./data/diaries:/data/diaries
      - ./data/media:/data/media

  web:
    command: npm run dev
    volumes:
      - ./web/src:/app/src
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
